id: com.jeffser.Nocturne
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: nocturne
finish-args:
  - '--share=network'
  - '--share=ipc'
  - '--socket=fallback-x11'
  - '--device=dri'
  - '--socket=wayland'
  - '--socket=pulseaudio'
  - '--filesystem=xdg-music:ro'
  - '--filesystem=xdg-run/discord-ipc-0'
cleanup:
  - /include
  - /lib/pkgconfig
  - /man
  - /share/doc
  - /share/gtk-docw
  - /share/man
  - /share/pkgconfig
  - '*.la'
  - '*.a'
modules:
